# ESPHome config for arc-bridge (defl/arc-bridge branch)
# Uses your fork so you get the map-iterator crash fix and send_pair_command().

substitutions:
  device_name: "hat-esphome-ss-blinds"
  friendly_name: "House Attic ESPHome Shade Store Blinds"

external_components:
  - source: github://defl/arc-bridge
    components: [arc_bridge]
    ref: main   # use your branch name here if not main
    refresh: 1s   # optional while iterating to force refetch

esphome:
  name: $device_name
  friendly_name: $friendly_name
  on_boot:
    priority: -200
    then:
      - logger.log: "Waiting for Ethernet link ..."
      - wait_until:
          lambda: 'return id(eth0).is_connected();'
      - logger.log: "Ethernet up"
      - switch.turn_on: green

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG
  baud_rate: 0  # disable serial logging, free UART0 pins

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: homeassistant
    id: homeassistant_time

ethernet:
  id: eth0
  type: LAN8720
  mdc_pin: GPIO16
  mdio_pin: GPIO23
  clk:
    pin: GPIO0
    mode: CLK_EXT_IN
  phy_addr: 1
  power_pin: GPIO2

web_server:
  port: 80

i2c:
  id: i2c_bus
  sda: GPIO14
  scl: GPIO4
  frequency: 100kHz
  scan: false

pca9554:
  - id: pca9554a_device
    i2c_id: i2c_bus
    address: 0x41

switch:
  - platform: gpio
    name: "LED Red"
    id: red
    pin:
      pca9554: pca9554a_device
      number: 0
      mode: { output: true }
      inverted: true

  - platform: gpio
    name: "LED Blue"
    id: blue
    pin:
      pca9554: pca9554a_device
      number: 1
      mode: { output: true }
      inverted: true

  - platform: gpio
    name: "LED Green"
    id: green
    pin:
      pca9554: pca9554a_device
      number: 2
      mode: { output: true }
      inverted: true

button:
  - platform: template
    name: "ARC Bridge Pairing"
    icon: "mdi:link-plus"
    on_press:
      - lambda: |-
          id(arc)->send_pair_command();

binary_sensor:
  - platform: gpio
    name: "Button GPIO36 Pair"
    pin:
      number: GPIO36
      mode:
        input: true
      inverted: true
    on_press:
      - lambda: |-
          id(arc)->send_pair_command();

uart:
  - id: rf_a
    rx_pin: GPIO13    # STM32 RX ← ESP TX
    tx_pin: GPIO15    # STM32 TX → ESP RX
    baud_rate: 115200
    data_bits: 8
    parity: NONE
    stop_bits: 1
    rx_buffer_size: 4096

arc_bridge:
  id: arc
  uart_id: rf_a

cover:
  # Example real blinds (uncomment and set blind_id when paired):
  # - platform: arc_bridge
  #   bridge_id: arc
  #   id: _id_2sy
  #   device_class: shade
  #   name: "${friendly_name} Blind 1"
  #   blind_id: "2SY"
  #   link_quality: lq_2sy
  #   status: status_2sy
  # - platform: arc_bridge
  #   bridge_id: arc
  #   id: id_r7y
  #   device_class: shade
  #   name: "${friendly_name} Blind 2"
  #   blind_id: "R7Y"
  #   link_quality: lq_r7y
  #   status: status_r7y

  - platform: template
    name: "Fake Cover"
    id: fake_cover
    open_action:
      - logger.log: "Opening Fake Cover"
    close_action:
      - logger.log: "Closing Fake Cover"
    stop_action:
      - logger.log: "Stopping Fake Cover"
    optimistic: true

sensor:
  # Link quality sensors for blinds (uncomment with corresponding cover):
  # - platform: template
  #   id: lq_2sy
  #   name: "${friendly_name} Blind 1 Link Quality"
  #   unit_of_measurement: "dBm"
  #   icon: "mdi:signal"
  # - platform: template
  #   id: lq_r7y
  #   name: "${friendly_name} Blind 2 Link Quality"
  #   unit_of_measurement: "dBm"
  #   icon: "mdi:signal"

  - platform: uptime
    name: ${friendly_name} Uptime
    id: uptime_sec
    update_interval: 120s

text_sensor:
  # Status sensors for blinds (uncomment with corresponding cover):
  # - platform: template
  #   id: status_2sy
  #   name: "${friendly_name} Blind 1 Status"
  # - platform: template
  #   id: status_r7y
  #   name: "${friendly_name} Blind 2 Status"

  - platform: template
    name: "Fake Text Sensor"
    id: fake_text_sensor
    lambda: |-
      return std::string("This is a static text value.");
    update_interval: 10s
