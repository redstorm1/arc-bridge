name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install esphome

      - name: Check docs
        run: python tests/check_docs.py

      - name: Run protocol parser test
        run: python tests/run_protocol_parser_test.py

      - name: Run battery curve test
        run: python tests/run_battery_curve_test.py

      - name: Run delivery test
        run: python tests/run_delivery_test.py

      - name: Run TX queue test
        run: python tests/run_tx_queue_test.py

      - name: Validate ESPHome configs
        run: python tests/run_component_validation.py
